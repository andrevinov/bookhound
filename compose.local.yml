services:
  bookhound:
    build:
      context: .
      dockerfile: docker/Dockerfile.local
    image: bookhound:local
    working_dir: /workspace
    stdin_open: true
    tty: true
    volumes:
      - .:/workspace
      - ./.local/data:/data
      - ./.local/bookhound.toml:/config/bookhound.toml:ro
    environment:
      PYTHONUNBUFFERED: "1"
      BOOKHOUND_LOG_LEVEL: "DEBUG"
      BOOKHOUND_LOG_FORMAT: "json"
      BOOKHOUND_LOG_DESTINATION: "file"
      BOOKHOUND_LOG_FILE: "/data/bookhound.jsonl"
    command: bash
